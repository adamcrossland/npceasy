<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="shieldGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2aa393"/>
      <stop offset="100%" stop-color="#145248"/>
    </radialGradient>
    <radialGradient id="shieldSheen" cx="38%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Shield body -->
  <path d="M32 4 L56 14 L56 34 Q56 52 32 62 Q8 52 8 34 L8 14 Z"
        fill="url(#shieldGrad)" stroke="#0d3b30" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Sheen overlay -->
  <path d="M32 4 L56 14 L56 34 Q56 52 32 62 Q8 52 8 34 L8 14 Z"
        fill="url(#shieldSheen)"/>
  <!-- Shield inner border -->
  <path d="M32 10 L51 18.5 L51 34 Q51 49 32 58 Q13 49 13 34 L13 18.5 Z"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Sword blade (angled diagonally, top-right to bottom-left) -->
  <line x1="44" y1="14" x2="22" y2="46" stroke="#f5e9c8" stroke-width="3" stroke-linecap="round"/>
  <!-- Sword tip -->
  <line x1="22" y1="46" x2="19" y2="51" stroke="#f5e9c8" stroke-width="2" stroke-linecap="round"/>
  <!-- Crossguard -->
  <line x1="37.5" y1="21.5" x2="29" y2="25.5" stroke="#e8d89c" stroke-width="3" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="45.5" cy="13" r="2.5" fill="#e8d89c" stroke="#c4a84a" stroke-width="0.8"/>

  <!-- Quill / feather (lower-left area of shield, representing character creation) -->
  <path d="M20 40 Q24 30 30 34 Q26 36 24 42 Q22 44 20 40Z"
        fill="#f5e9c8" opacity="0.85"/>
  <line x1="24" y1="42" x2="21" y2="48" stroke="#e8d49a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Small five-pointed star (top centre of shield) -->
  <polygon points="32,16 33.4,20.3 37.9,20.3 34.3,22.9 35.6,27.1 32,24.5 28.4,27.1 29.7,22.9 26.1,20.3 30.6,20.3"
           fill="#f9d96a" stroke="#c4a84a" stroke-width="0.6" stroke-linejoin="round"/>
</svg>